<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind config for Inter -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#daddc9] font-inter m-0">
  <main class="flex flex-col items-center justify-center min-h-screen px-6 md:px-12 text-center">
    
    <!-- Heading -->
    <h2 class="text-4xl md:text-5xl font-serif text-neutral-900 mb-8">
      Thank You!
    </h2>
    
    <!-- Paragraph -->
    <p class="text-lg md:text-xl text-neutral-700 leading-relaxed max-w-prose font-sans">
      Your message has been sent. I’ll get back to you soon!
    </p>

    <!-- Optional Back to Home button -->
    <a href="/index.html"
   class="mt-10 inline-block bg-neutral-700 text-white font-sans px-6 py-3 rounded-md
          hover:bg-neutral-900 transition-colors duration-300
          focus:outline-none focus:ring-4 focus:ring-white focus:ring-offset-2 focus:ring-offset-[#daddc9] focus:rounded-md"
>
  Back to Home
</a>
    
  </main>
</body>
</html>
